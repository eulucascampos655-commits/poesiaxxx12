<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduRede Social | Comunidade Criativa</title>
    <style>
        /* CSS PROFISSIONAL - DESIGN MODERNO */
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #00cec9;
            --danger: #ff7675;
            --success: #00b894;
            --bg: #dfe6e9;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            color: #2d3436;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .hidden { display: none !important; }

        h1 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #636e72; margin-bottom: 25px; font-size: 14px; }

        input, textarea, select {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #eee;
            border-radius: 12px;
            box-sizing: border-box;
            transition: 0.3s;
            font-size: 16px;
        }

        input:focus, textarea:focus { border-color: var(--primary); outline: none; background: #fff; }

        button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4); }
        .btn-admin { background: #2d3436; margin-top: 15px; opacity: 0.8; }

        /* Estilo dos Posts */
        .post-card {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 15px;
            border-left: 6px solid var(--primary);
            position: relative;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .nota-badge {
            position: absolute;
            top: -10px;
            right: 15px;
            background: #f1c40f;
            color: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .user-online { color: var(--success); font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; display: inline-block; }

        .type-tag { font-size: 11px; background: #eee; padding: 2px 8px; border-radius: 5px; text-transform: uppercase; color: #636e72; }
    </style>
</head>
<body>

    <div id="section-login" class="container">
        <h1>EduRede 🎓</h1>
        <p class="subtitle">Sua rede social de arte e motivação escolar</p>
        <input type="text" id="login-nome" placeholder="Nome Completo">
        <input type="text" id="login-cpf" placeholder="CPF (Ex: 000.000.000-00)" maxlength="14">
        <input type="text" id="login-turma" placeholder="Turma (ex: 2º ano B)">
        <input type="text" id="login-escola" placeholder="Nome da Instituição">
        <input type="text" id="login-aura" placeholder="Sua Aura hoje (Ex: Criativa, Inspirada)">
        <button onclick="validaEntrada()">Entrar na Rede</button>
        <button class="btn-admin" onclick="trocarTela('section-login', 'section-admin-auth')">Painel do Professor</button>
    </div>

    <div id="section-feed" class="container hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #ddd;">
            <div>
                <span class="user-online"><span class="dot"></span> Online</span>
                <strong id="display-nome">Usuário</strong>
            </div>
            <button style="width: auto; padding: 8px 15px; margin:0;" onclick="location.reload()">Sair</button>
        </div>

        <div style="margin-top: 25px; background: rgba(108, 92, 231, 0.05); padding: 20px; border-radius: 15px;">
            <h3>✨ Criar Nova Obra</h3>
            <select id="post-tipo">
                <option value="Poema">📜 Poema</option>
                <option value="Música">🎵 Letra de Música</option>
                <option value="Frase">💡 Frase Motivacional</option>
                <option value="Texto">✍️ Texto / Crônica</option>
            </select>
            <textarea id="post-texto" rows="4" placeholder="Inspire o mundo com suas palavras..."></textarea>
            <button onclick="enviarParaNuvem()">Publicar Agora</button>
        </div>

        <div id="feed-dinamico">
            </div>
    </div>

    <div id="section-admin-auth" class="container hidden">
        <h2>Acesso Administrativo</h2>
        <p class="subtitle">Área restrita para avaliação de professores</p>
        <input type="password" id="admin-password" placeholder="Digite a chave mestre">
        <button onclick="autenticarAdmin()">Verificar Senha</button>
        <button class="btn-admin" onclick="location.reload()">Voltar ao Login</button>
    </div>

    <div id="section-admin-panel" class="container hidden">
        <h2>Avaliador de Conteúdo</h2>
        <div id="admin-feed"></div>
        <button onclick="trocarTela('section-admin-panel', 'section-feed')">Visualizar como Aluno</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, update } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURAÇÃO DO SEU PROJETO (COLE SEUS DADOS AQUI)
        const firebaseConfig = {
            apiKey: "COLE_AQUI",
            authDomain: "poesiaxxx12.firebaseapp.com",
            databaseURL: "https://poesiaxxx12-default-rtdb.firebaseio.com",
            projectId: "poesiaxxx12",
            storageBucket: "poesiaxxx12.appspot.com",
            messagingSenderId: "COLE_AQUI",
            appId: "COLE_AQUI"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentUser = {};

        // FORMATAÇÃO AUTOMÁTICA DE CPF
        document.getElementById('login-cpf').addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, "");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            e.target.value = v;
        });

        // TROCA DE TELA
        window.trocarTela = (idSair, idEntrar) => {
            document.getElementById(idSair).classList.add('hidden');
            document.getElementById(idEntrar).classList.remove('hidden');
        }

        // LOGIN COM VALIDAÇÃO
        window.validaEntrada = () => {
            const nome = document.getElementById('login-nome').value;
            const cpf = document.getElementById('login-cpf').value;
            const aura = document.getElementById('login-aura').value;

            if(nome.length < 3 || cpf.length < 14) {
                return alert("Por favor, preencha Nome e CPF corretamente!");
            }

            currentUser = {
                nome: nome,
                aura: aura,
                turma: document.getElementById('login-turma').value,
                escola: document.getElementById('login-escola').value
            };

            document.getElementById('display-nome').innerText = nome;
            trocarTela('section-login', 'section-feed');
            iniciarEscutaFeed();
        }

        // ENVIAR POST
        window.enviarParaNuvem = () => {
            const texto = document.getElementById('post-texto').value;
            const tipo = document.getElementById('post-tipo').value;
            
            if(!texto.trim()) return alert("Escreva algo antes de postar!");

            const postRef = ref(db, 'posts');
            const novoPost = push(postRef);
            
            set(novoPost, {
                autor: currentUser.nome,
                escola: currentUser.escola,
                turma: currentUser.turma,
                tipo: tipo,
                conteudo: texto,
                nota: null,
                data: Date.now()
            });

            document.getElementById('post-texto').value = "";
            alert("Publicado com sucesso!");
        }

        // ESCUTAR FEED EM TEMPO REAL
        function iniciarEscutaFeed() {
            onValue(ref(db, 'posts'), (snapshot) => {
                const feed = document.getElementById('feed-dinamico');
                feed.innerHTML = "";
                
                let postsArray = [];
                snapshot.forEach(child => {
                    postsArray.push({ id: child.key, ...child.val() });
                });

                // Mostrar os mais recentes primeiro
                postsArray.reverse().forEach(post => {
                    feed.innerHTML += `
                        <div class="post-card">
                            <span class="nota-badge">${post.nota ? '⭐ ' + post.nota : '⏳ Avaliando'}</span>
                            <span class="type-tag">${post.tipo}</span>
                            <p style="margin: 10px 0;">${post.conteudo}</p>
                            <div style="font-size: 12px; color: #636e72;">
                                Por <strong>${post.autor}</strong> | ${post.turma}
                            </div>
                        </div>
                    `;
                });
            });
        }

        // ADMIN LÓGICA
        window.autenticarAdmin = () => {
            const senha = document.getElementById('admin-password').value;
            if(senha === "admin123") { // Mude aqui sua senha
                trocarTela('section-admin-auth', 'section-admin-panel');
                carregarAdminPanel();
            } else { alert("Senha de Administrador Inválida!"); }
        }

        function carregarAdminPanel() {
            onValue(ref(db, 'posts'), (snapshot) => {
                const div = document.getElementById('admin-feed');
                div.innerHTML = "";
                snapshot.forEach(child => {
                    const p = child.val();
                    const id = child.key;
                    div.innerHTML += `
                        <div class="post-card">
                            <p><strong>${p.autor}</strong>: ${p.conteudo}</p>
                            <div style="display:flex; gap:10px;">
                                <input type="number" id="nota-${id}" placeholder="0-10" style="width: 80px; margin:0;">
                                <button onclick="atribuirNota('${id}')" style="margin:0; padding:5px;">Dar Nota</button>
                            </div>
                        </div>
                    `;
                });
            });
        }

        window.atribuirNota = (id) => {
            const nota = document.getElementById(`nota-${id}`).value;
            if(!nota) return alert("Insira uma nota!");
            
            update(ref(db, 'posts/' + id), { nota: nota });
            alert("Nota salva no sistema!");
        }

    </script>
</body>
</html>>
