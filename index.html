<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduRede Social | Real-Time Completo</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f0f2f5; --white: #ffffff; --online: #00b894; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .post-card { background: #fff; border: 1px solid #eee; padding: 20px; margin-top: 15px; border-radius: 15px; position: relative; border-left: 5px solid var(--primary); }
        .status-badge { color: var(--online); font-weight: bold; font-size: 14px; margin-bottom: 10px; display: block; }
        .nota-badge { position: absolute; top: 15px; right: 15px; background: #f1c40f; color: white; padding: 5px 12px; border-radius: 20px; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

    <div id="section-login" class="container">
        <h1 style="text-align: center; color: var(--primary);">EduRede 🎓</h1>
        <input type="text" id="login-nome" placeholder="Nome Completo">
        <input type="text" id="login-cpf" placeholder="CPF">
        <input type="text" id="login-turma" placeholder="Turma">
        <input type="text" id="login-aura" placeholder="Sua Aura">
        <button onclick="entrar()">Entrar no Feed</button>
        <button style="background: #2d3436;" onclick="mostrarPainelAdmin()">Painel do Professor</button>
    </div>

    <div id="section-feed" class="container hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <span class="status-badge">● Online Agora</span>
                <strong id="perfil-nome"></strong>
            </div>
            <button style="width: auto; margin: 0;" onclick="location.reload()">Sair</button>
        </div>
        <hr>
        <h3>Publicar Nova Obra</h3>
        <select id="post-tipo">
            <option value="Poema">Poema</option>
            <option value="Música">Música</option>
            <option value="Motivação">Frase Motivacional</option>
        </select>
        <textarea id="post-texto" rows="3" placeholder="Escreva aqui..."></textarea>
        <button onclick="publicar()">Publicar para Todos</button>
        
        <div id="feed-lista">
            </div>
    </div>

    <div id="section-admin" class="container hidden">
        <h2>Avaliação de Professores</h2>
        <div id="admin-auth">
            <input type="password" id="admin-senha" placeholder="Senha Mestra">
            <button onclick="validarAdmin()">Acessar Painel</button>
            <button style="background: #ccc;" onclick="location.reload()">Voltar</button>
        </div>
        <div id="admin-painel" class="hidden">
            <div id="admin-lista-posts">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURAÇÃO (COLE OS SEUS DADOS AQUI!)
        const firebaseConfig = {
            apiKey: "COLE_AQUI",
            authDomain: "poesiaxxx12.firebaseapp.com",
            databaseURL: "https://poesiaxxx12-default-rtdb.firebaseio.com",
            projectId: "poesiaxxx12",
            storageBucket: "poesiaxxx12.appspot.com",
            messagingSenderId: "COLE_AQUI",
            appId: "COLE_AQUI"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let userLocal = {};

        // LOGIN
        window.entrar = () => {
            const nome = document.getElementById('login-nome').value;
            if(!nome) return alert("Digite seu nome!");
            userLocal = { nome, turma: document.getElementById('login-turma').value };
            document.getElementById('perfil-nome').innerText = nome;
            document.getElementById('section-login').classList.add('hidden');
            document.getElementById('section-feed').classList.remove('hidden');
            escutarBanco(); // Começa a ler o banco em tempo real
        };

        // PUBLICAR
        window.publicar = () => {
            const texto = document.getElementById('post-texto').value;
            const tipo = document.getElementById('post-tipo').value;
            if(!texto) return alert("Escreva algo!");

            const novoPostRef = push(ref(db, 'postagens'));
            set(novoPostRef, {
                autor: userLocal.nome,
                turma: userLocal.turma,
                conteudo: texto,
                categoria: tipo,
                nota: null,
                data: Date.now()
            }).then(() => {
                document.getElementById('post-texto').value = "";
            }).catch((err) => alert("Erro ao publicar: " + err));
        };

        // LER EM TEMPO REAL (PARA TODOS OS USUÁRIOS)
        function escutarBanco() {
            const dbRef = ref(db, 'postagens');
            onValue(dbRef, (snapshot) => {
                const lista = document.getElementById('feed-lista');
                lista.innerHTML = "<h3>Feed da Comunidade</h3>";
                const dados = snapshot.val();
                if (dados) {
                    // Transforma em array para inverter e mostrar o mais novo primeiro
                    Object.keys(dados).reverse().forEach(id => {
                        const post = dados[id];
                        lista.innerHTML += `
                            <div class="post-card">
                                <span class="nota-badge">${post.nota ? '⭐ ' + post.nota : '⏳'}</span>
                                <small>${post.categoria} | <strong>${post.autor}</strong></small>
                                <p>${post.conteudo}</p>
                            </div>
                        `;
                    });
                }
            });
        }

        // ADMIN
        window.mostrarPainelAdmin = () => {
            document.getElementById('section-login').classList.add('hidden');
            document.getElementById('section-admin').classList.remove('hidden');
        };

        window.validarAdmin = () => {
            const senha = document.getElementById('admin-senha').value;
            if(senha === "admin123") {
                document.getElementById('admin-auth').classList.add('hidden');
                document.getElementById('admin-painel').classList.remove('hidden');
                escutarAdmin();
            } else { alert("Senha incorreta!"); }
        };

        function escutarAdmin() {
            onValue(ref(db, 'postagens'), (snapshot) => {
                const lista = document.getElementById('admin-lista-posts');
                lista.innerHTML = "<h3>Avaliar Trabalhos</h3>";
                snapshot.forEach((child) => {
                    const post = child.val();
                    const id = child.key;
                    lista.innerHTML += `
                        <div class="post-card">
                            <p><strong>${post.autor}</strong>: ${post.conteudo}</p>
                            <input type="number" id="input-${id}" placeholder="Nota 0-10">
                            <button onclick="salvarNota('${id}')">Confirmar Nota</button>
                        </div>
                    `;
                });
            });
        }

        window.salvarNota = (id) => {
            const n = document.getElementById(`input-${id}`).value;
            update(ref(db, 'postagens/' + id), { nota: n });
            alert("Nota salva!");
        };
    </script>
</body>
</html>
